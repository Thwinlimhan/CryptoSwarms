#      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
#      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
#    restart: always
#    ports:
#      - "7474:7474"
#      - "7687:7687"
#    volumes:
#      - neo4j_data:/data

  # ── LOCAL LLM ─────────────────────────────────────────────────
#  sglang:
#    image: lmsysorg/sglang:latest
#    runtime: nvidia
#    command: >
#      python -m sglang.launch_server
#      --model-path Qwen/Qwen2.5-VL-7B-Instruct
#      --port 30000 --mem-fraction-static 0.4
#    restart: always
#    ports:
#      - "30000:30000"
#    volumes:
#      - ~/.cache/huggingface:/root/.cache/huggingface

  # ── CAMOUFOX REST SERVER ───────────────────────────────────────
  camoufox:
    image: ghcr.io/redf0x1/camofox-browser:latest
    environment:
      CAMOFOX_MAX_SESSIONS: 20
      # DEFAULT_GEO is now handled via presets or search macros
    ports:
      - "8080:9377"
    networks:
      - research_net

  # ── SWARM CORE ────────────────────────────────────────────────
  swarm-api:
    build:
      context: .
      dockerfile: agents/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://swarm:${DB_PASSWORD}@timescaledb:5432/swarm_db
      NEO4J_URL: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      SGLANG_URL: http://sglang:30000
      CAMOUFOX_URL: http://camoufox:8080
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
    depends_on:
      - redis
      - timescaledb
#      - neo4j
#      - qdrant
#      - sglang
    ports:
      - "8000:8000"
    networks:
      - research_net
      - execution_net

  # ── MISSION CONTROL ────────────────────────────────────────────
  mission-control:
    build: ./mission-control-upstream
    environment:
      AUTH_USER: ${MC_USER}
      AUTH_PASS: ${MC_PASS}
      API_KEY: ${MC_API_KEY}
      MC_ALLOWED_HOSTS: localhost,127.0.0.1
      MISSION_CONTROL_DATA_DIR: /app/.data
      MISSION_CONTROL_ENABLE_OPENCLAW_FEATURES: "false"
      NEXT_PUBLIC_ENABLE_OPENCLAW_FEATURES: "false"
      NEXT_PUBLIC_GATEWAY_HOST: swarm-api
      NEXT_PUBLIC_GATEWAY_PORT: 8000
      NEXT_PUBLIC_GATEWAY_PROTOCOL: ws
    ports:
      - "3000:3000"
    volumes:
      - mission_control_data:/app/.data

  # ── OBSERVABILITY ─────────────────────────────────────────────
  deepflow-server:
    image: deepflowce/deepflow-server:latest
    profiles: ["observability"]
    network_mode: host
    restart: unless-stopped
    environment:
      K8S_NODE_NAME_FOR_DEEPFLOW: cryptoswarms-local
      K8S_NODE_IP_FOR_DEEPFLOW: 127.0.0.1
      K8S_POD_NAME_FOR_DEEPFLOW: deepflow-server
      K8S_POD_IP_FOR_DEEPFLOW: 127.0.0.1
      K8S_NAMESPACE_FOR_DEEPFLOW: default
      DEEPFLOW_SERVER_RUNNING_MODE: standalone
    volumes:
      - ./infra/deepflow/server.yaml:/etc/server.yaml:ro

  deepflow-agent:
    image: deepflowce/deepflow-agent:latest
    profiles: ["observability"]
    privileged: true
    pid: host
    network_mode: host
    restart: unless-stopped
    depends_on:
      - deepflow-server
    volumes:
      - ./infra/deepflow/deepflow-agent.yaml:/etc/deepflow-agent/deepflow-agent.yaml:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /proc:/proc:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
networks:
  research_net:
  execution_net:

volumes:
  timescale_data:
  qdrant_data:
  neo4j_data:
  mission_control_data:




