

services:
  # ── DATABASES ─────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: swarm_db
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./data/schemas:/docker-entrypoint-initdb.d
    restart: always
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d swarm_db -U swarm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  camoufox:
    image: ghcr.io/redf0x1/camofox-browser:latest
    environment:
      CAMOFOX_MAX_SESSIONS: 20
      # DEFAULT_GEO is now handled via presets or search macros
    ports:
      - "8080:9377"
    networks:
      - research_net

  # ── SWARM CORE ────────────────────────────────────────────────
  swarm-api:
    build:
      context: .
      dockerfile: agents/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://swarm:${DB_PASSWORD}@timescaledb:5432/swarm_db
      CAMOUFOX_URL: http://camoufox:8080
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    secrets:
      - db_password
      - exchange_key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8000:8000"
    networks:
      - research_net
      - execution_net

  # ── CRYPTO SWARMS FRONTEND ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - swarm-api
    networks:
      - research_net

  # ── MISSION CONTROL ────────────────────────────────────────────
  mission-control:
    build: ./mission-control-upstream
    environment:
      AUTH_USER: ${MC_USER}
      AUTH_PASS: ${MC_PASS}
      API_KEY: ${MC_API_KEY}
      MC_ALLOWED_HOSTS: localhost,127.0.0.1
      MISSION_CONTROL_DATA_DIR: /app/.data
      MISSION_CONTROL_ENABLE_OPENCLAW_FEATURES: "false"
      NEXT_PUBLIC_ENABLE_OPENCLAW_FEATURES: "false"
      NEXT_PUBLIC_GATEWAY_HOST: swarm-api
      NEXT_PUBLIC_GATEWAY_PORT: 8000
      NEXT_PUBLIC_GATEWAY_PROTOCOL: ws
    ports:
      - "3000:3000"
    volumes:
      - mission_control_data:/app/.data

  # ── HYPERLIQUID PAPER TRADING (HyPaper) ────────────────────────
  hypaper:
    build:
      context: ./hypaper-backend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://swarm:${DB_PASSWORD}@timescaledb:5432/swarm_db
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - DEFAULT_BALANCE=100000
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - research_net
      - execution_net
    restart: unless-stopped

  # ── OBSERVABILITY ─────────────────────────────────────────────
  deepflow-server:
    image: deepflowce/deepflow-server:latest
    profiles: ["observability"]
    network_mode: host
    restart: unless-stopped
    environment:
      K8S_NODE_NAME_FOR_DEEPFLOW: cryptoswarms-local
      K8S_NODE_IP_FOR_DEEPFLOW: 127.0.0.1
      K8S_POD_NAME_FOR_DEEPFLOW: deepflow-server
      K8S_POD_IP_FOR_DEEPFLOW: 127.0.0.1
      K8S_NAMESPACE_FOR_DEEPFLOW: default
      DEEPFLOW_SERVER_RUNNING_MODE: standalone
    volumes:
      - ./infra/deepflow/server.yaml:/etc/server.yaml:ro

  deepflow-agent:
    image: deepflowce/deepflow-agent:latest
    profiles: ["observability"]
    privileged: true
    pid: host
    network_mode: host
    restart: unless-stopped
    depends_on:
      - deepflow-server
    volumes:
      - ./infra/deepflow/deepflow-agent.yaml:/etc/deepflow-agent/deepflow-agent.yaml:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /proc:/proc:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
secrets:
  db_password:
    file: ./secrets/db_password.txt
  exchange_key:
    file: ./secrets/exchange_key.txt

networks:
  research_net:
  execution_net:

volumes:
  timescale_data:
  mission_control_data:
  # qdrant_data:  # uncomment when qdrant service is enabled
  # neo4j_data:   # uncomment when neo4j service is enabled




