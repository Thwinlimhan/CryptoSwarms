version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-swarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swarm_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-swarm_db}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./data/schemas:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swarm} -d ${POSTGRES_DB:-swarm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/neo4j_change_me}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  sglang:
    image: lmsysorg/sglang:latest
    container_name: sglang
    command: ["python3", "-m", "sglang.launch_server", "--host", "0.0.0.0", "--port", "30000", "--model-path", "${SGLANG_MODEL_PATH:-Qwen/Qwen2.5-3B-Instruct}"]
    ports:
      - "30000:30000"

  swarm-api:
    build:
      context: ../agents
    container_name: swarm-api
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL:-postgresql://swarm:swarm_change_me@timescaledb:5432/swarm_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      NEO4J_URL: ${NEO4J_URL:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_change_me}
      SGLANG_URL: ${SGLANG_URL:-http://sglang:30000}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-change_me_api_token}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      sglang:
        condition: service_started
    ports:
      - "8000:8000"

  mission-control:
    profiles: ["mission-control"]
    build:
      context: ../mission-control
    container_name: mission-control
    environment:
      AUTH_USER: ${MC_USER:-admin}
      AUTH_PASS: ${MC_PASS:-change_me}
      API_KEY: ${MC_API_KEY:-change_me_api_key}
      SWARM_API: ${SWARM_API_URL:-http://swarm-api:8000}
    depends_on:
      - swarm-api
    ports:
      - "3000:3000"

volumes:
  timescale_data:
  qdrant_data:
  neo4j_data:
