services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always
    ports:
      - "6333:6333"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  sglang:
    image: lmsysorg/sglang:latest
    runtime: nvidia
    command: >
      python -m sglang.launch_server
      --model-path Qwen/Qwen2.5-VL-7B-Instruct
      --port 30000 --mem-fraction-static 0.4
    restart: always
    ports:
      - "30000:30000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

volumes:
  qdrant_data:
  neo4j_data:
